name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push/PR update supersedes whatever's still running for the same
# ref, so cancel it rather than let it burn minutes to a result nobody needs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'postgresql://postgres:password@localhost:54322/postgres?schema=public'
      DIRECT_URL: 'postgresql://postgres:password@localhost:54322/postgres?schema=public'
      STRIPE_API_KEY: 'sk_test_dummy'
      ADMIN_EMAIL: 'admin@example.com'
      ADMIN_PASSWORD_HASH: '$2b$12$abcdefghijklmnopqrstuvwxyz0123456789'
      SESSION_SECRET: 'ci_placeholder_secret_at_least_32_chars'
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run database migrations
        run: npm run deploy

      # vercel-action triggers a remote build on Vercel's infra — the ci job
      # already verified `next build` succeeds, so building again here would
      # just be a second full build of output nothing uses.
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          vercel-version: latest

  deploy-demo:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DEMO_DIRECT_URL }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run database migrations against the demo database
        run: npm run deploy

      - name: Seed/refresh demo data
        run: npm run seed-demo

      # vercel-action triggers a remote build on Vercel's infra — see the note
      # in the `deploy` job above.
      - name: Deploy to Vercel (demo project)
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.DEMO_VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          vercel-version: latest
